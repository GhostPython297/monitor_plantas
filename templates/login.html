{% extends "base.html" %}
{% block titulo %}Login — Monitor de Plantas{% endblock %}

{% block conteudo %}
<div class="form-container">
  <h1>Entrar</h1>
  <form method="POST" action="{{ url_for('colaborador.login') }}">
    <label for="email">E-mail</label>
    <input type="email" id="email" name="email" required autofocus>

    <label for="senha">Senha</label>
    <input type="password" id="senha" name="senha" required>

    <button type="submit">Entrar</button>
  </form>
  <p>Não tem conta? <a href="{{ url_for('colaborador.cadastro') }}">Cadastre-se</a></p>
</div>
{% endblock %}
