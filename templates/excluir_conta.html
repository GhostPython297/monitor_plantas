{% extends "base.html" %}
{% block titulo %}Excluir Conta{% endblock %}

{% block conteudo %}
<div class="max-w-sm mx-auto mt-20 glass-card p-8">
  <div class="text-center mb-6">
    <div class="text-4xl mb-2">⚠️</div>
    <h1 class="text-2xl font-bold text-red-800">Excluir conta</h1>
    <p class="text-red-700 text-sm mt-3">
      Esta ação é <strong>irreversível</strong>. Sua conta e todas as suas plantas
      serão permanentemente removidas.
    </p>
  </div>

  <form method="POST" action="{{ url_for('colaborador.excluir') }}" class="flex flex-col gap-4">
    <div>
      <label for="senha" class="block text-sm font-medium text-red-800 mb-1">Confirme sua senha para continuar</label>
      <input type="password" id="senha" name="senha" required autofocus class="glass-input">
    </div>

    <div class="flex flex-col gap-2 pt-2">
      <button type="submit" class="glass-btn-danger text-center">Excluir minha conta permanentemente</button>
      <a href="{{ url_for('colaborador.perfil') }}" class="glass-btn-secondary text-center">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
