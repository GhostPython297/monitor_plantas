{% extends "base.html" %}
{% block titulo %}Registrar Cuidado — {{ planta.nome }}{% endblock %}

{% block conteudo %}
<div class="max-w-md mx-auto">
  <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
    <h1 class="text-2xl font-bold text-green-900">💧 Registrar Cuidado</h1>
    <a href="{{ url_for('planta.detalhes', planta_id=planta.id) }}" class="glass-btn-secondary">← Voltar</a>
  </div>

  <div class="glass-card p-6">
    <p class="text-green-700 text-sm mb-5">Planta: <strong class="text-green-900">{{ planta.nome }}</strong></p>

    <form method="POST" action="{{ url_for('registro.novo', planta_id=planta.id) }}" class="flex flex-col gap-4">
      <div>
        <label for="tipo" class="block text-sm font-medium text-green-800 mb-1">Tipo de cuidado</label>
        <select id="tipo" name="tipo" class="glass-input">
          {% for t in tipos %}
          <option value="{{ t }}">{{ t|capitalize }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label for="data" class="block text-sm font-medium text-green-800 mb-1">Data do cuidado</label>
        <input type="date" id="data" name="data" value="{{ hoje }}" required class="glass-input">
      </div>

      <div>
        <label for="observacao" class="block text-sm font-medium text-green-800 mb-1">Observação <span class="font-normal text-green-600">(opcional)</span></label>
        <textarea id="observacao" name="observacao" rows="3" placeholder="Ex: solo úmido, folhas amareladas..." class="glass-input" style="resize:vertical;"></textarea>
      </div>

      <div class="flex gap-3 flex-wrap pt-2">
        <button type="submit" class="glass-btn-primary">Registrar</button>
        <a href="{{ url_for('planta.detalhes', planta_id=planta.id) }}" class="glass-btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
